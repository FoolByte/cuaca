name: Weather ETL Pipeline

# Every 3 hours with 30min buffer — synced with BMKG forecast cycles
# 02:30, 05:30, 08:30, 11:30, 14:30, 17:30, 20:30, 23:30 WIB (UTC: 30 1,4,7,10,13,16,19,22)
on:
  schedule:
    - cron: "30 1,4,7,10,13,16,19,22 * * *"
  workflow_dispatch: # manual trigger

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: etl/requirements.txt

      - name: Install dependencies
        run: pip install -r etl/requirements.txt

      - name: Extract
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          WEATHER_PROVIDER: bmkg
        run: python -m etl.extract.run

      - name: Transform
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: python -m etl.transform.run

      - name: Load
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: python -m etl.load.run
