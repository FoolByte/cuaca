services:
  # ── PostgreSQL (DWH + Airflow metadata) ───────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: weather_postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-weather_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weather_pass}
      POSTGRES_DB: ${POSTGRES_DB:-weather_dwh}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weather_user} -d ${POSTGRES_DB:-weather_dwh}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Airflow ──────────────────────────────────────────────────────
  airflow-webserver:
    image: apache/airflow:2.10.5-python3.12
    container_name: weather_airflow_webserver
    restart: unless-stopped
    ports:
      - "${AIRFLOW_WEBSERVER_PORT:-8080}:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-weather_user}:${POSTGRES_PASSWORD:-weather_pass}@postgres:5432/airflow_metadata
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "${AIRFLOW_WEBSERVER_SECRET_KEY:-change-me-in-production}"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      # DWH connection for ETL tasks (via Airflow Connection)
      AIRFLOW_CONN_WEATHER_DWH: postgresql://${POSTGRES_USER:-weather_user}:${POSTGRES_PASSWORD:-weather_pass}@postgres:5432/${POSTGRES_DB:-weather_dwh}
    volumes:
      - ../etl/dags:/opt/airflow/dags
      - ../etl:/opt/airflow/etl
      - ../.env:/opt/airflow/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --password admin
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@example.com || true &&
        airflow variables set weather_etl_interval_minutes ${ETL_SCHEDULE_INTERVAL_MINUTES:-10} &&
        airflow webserver
      "
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  airflow-scheduler:
    image: apache/airflow:2.10.5-python3.12
    container_name: weather_airflow_scheduler
    restart: unless-stopped
    environment:
      AIRFLOW__CORE__EXECUTOR: ${AIRFLOW__CORE__EXECUTOR:-LocalExecutor}
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-weather_user}:${POSTGRES_PASSWORD:-weather_pass}@postgres:5432/airflow_metadata
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_CONN_WEATHER_DWH: postgresql://${POSTGRES_USER:-weather_user}:${POSTGRES_PASSWORD:-weather_pass}@postgres:5432/${POSTGRES_DB:-weather_dwh}
    volumes:
      - ../etl/dags:/opt/airflow/dags
      - ../etl:/opt/airflow/etl
      - ../.env:/opt/airflow/.env:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: airflow scheduler

  # ── Metabase (Dashboard) ──────────────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: weather_metabase
    restart: unless-stopped
    ports:
      - "${METABASE_PORT:-3000}:3000"
    environment:
      MB_DB_TYPE: h2
      # DWH connection (read-only user)
      MB_DB_CONNECTION_URI: ""
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ── Landing Page (Next.js) ─────────────────────────────────────────
  landing:
    build:
      context: ../apps/landing
      dockerfile: Dockerfile
    container_name: weather_landing
    restart: unless-stopped
    ports:
      - "${LANDING_PORT:-3001}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-weather_user}:${POSTGRES_PASSWORD:-weather_pass}@postgres:5432/${POSTGRES_DB:-weather_dwh}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── ETL Runner (manual one-shot) ──────────────────────────────────
  etl-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile.etl
    container_name: weather_etl_runner
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-weather_user}:${POSTGRES_PASSWORD:-weather_pass}@postgres:5432/${POSTGRES_DB:-weather_dwh}
      WEATHER_PROVIDER: ${WEATHER_PROVIDER:-mock}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - etl

volumes:
  postgres_data:
